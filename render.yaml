# Render Blueprint: Dashboard → New → Blueprint → connect repo; set values in the service Environment tab.
# Do not put secrets in this file (sync: false = define in Render UI only).
#
# New / important for this stack:
#   CORS_ORIGINS     Comma-separated browser origins (your Netlify URL, production domain, etc.)
#   GOOGLE_CLIENT_ID Web OAuth client id (same as VITE_GOOGLE_CLIENT_ID on the frontend)
#   GMAIL_USER       Learner email-OTP signup (Gmail address)
#   GMAIL_APP_PASSWORD Gmail app password for SMTP

services:
  - type: web
    name: iqmath-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL_CA_PATH
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: JUDGE0_API_URL
        sync: false
